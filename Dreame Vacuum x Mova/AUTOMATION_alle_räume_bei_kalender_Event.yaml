alias: All Rooms Vac/Mop
description: ""
triggers:
  - trigger: calendar.event_started
    target:
      entity_id: calendar.saug_kalender
    options:
      offset:
        hours: 0
        minutes: 5
        seconds: 0
        days: 0
      offset_type: before
conditions:
  - condition: template
    value_template: "{{ 'vacmop' in trigger.calendar_event.summary | lower }}"
actions:
  - action: notify.alexa_media_saschas_echo_show
    metadata: {}
    data:
      message: Achtung! Ich sauge und wische in 5 Minuten alle Räume!
  - delay:
      hours: 0
      minutes: 5
      seconds: 0
      milliseconds: 0
  - action: script.turn_on
    metadata: {}
    target:
      entity_id: script.z60_vacmop_all_rooms
    data: {}
mode: single

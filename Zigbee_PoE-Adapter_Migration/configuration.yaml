homeassistant:
  enabled: true
frontend:
  enabled: true
  port: 8099
mqtt:
  base_topic: zigbee2mqtt
  server: mqtt://192.168.2.139
  keepalive: 60
  reject_unauthorized: false
  version: 4
  include_device_information: true
serial:
  port: tcp://192.168.2.183:6638
  baudrate: 115200
  adapter: zstack
  disable_led: false
advanced:
  log_syslog:
    app_name: Zigbee2MQTT
    eol: /n
    host: localhost
    localhost: localhost
    path: /dev/log
    pid: process.pid
    port: 514
    protocol: udp4
    type: '5424'
  last_seen: ISO_8601_local
  log_symlink_current: true
  transmit_power: 20
  log_level: debug
